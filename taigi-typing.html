<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台語打字系統 TaigiType</title>
<meta name="description" content="全球最大台語智慧輸入系統 - 92,874字 × 語音輸入 × API平台">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="TaigiType">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1a1a;
  --paper: #f5f0e8;
  --accent: #c84b2e;
  --gold: #b5922a;
  --muted: #8a8070;
  --border: #d4cfc4;
  --card: #faf7f2;
  --teal: #2e6b5e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Serif TC', serif;
  min-height: 100vh;
}
header {
  border-bottom: 2px solid var(--ink);
  padding: 1.5rem 2rem;
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
}
.logo {
  font-family: 'Space Mono', monospace;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--accent);
}
.subtitle {
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}
.badge {
  margin-left: auto;
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  background: var(--ink);
  color: var(--paper);
  padding: 0.25rem 0.75rem;
  letter-spacing: 0.1em;
}
main {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem;
}
.mode-tabs {
  display: flex;
  gap: 0;
  border: 1.5px solid var(--ink);
  width: fit-content;
  margin-bottom: 2rem;
}
.mode-tab {
  padding: 0.6rem 1.5rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
  cursor: pointer;
  background: transparent;
  border: none;
  color: var(--muted);
  letter-spacing: 0.05em;
  transition: all 0.15s;
}
.mode-tab.active {
  background: var(--ink);
  color: var(--paper);
}
.mode-tab:not(:last-child) {
  border-right: 1.5px solid var(--ink);
}
.input-section {
  margin-bottom: 1.5rem;
}
.input-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.input-wrapper {
  position: relative;
  border: 2px solid var(--ink);
  background: white;
}
.input-bar {
  width: 100%;
  padding: 1rem 1.5rem;
  font-family: 'Space Mono', monospace;
  font-size: 1.4rem;
  border: none;
  outline: none;
  background: transparent;
  color: var(--ink);
  letter-spacing: 0.05em;
}
.input-hint {
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
}
.candidates-section {
  margin-bottom: 1.5rem;
  min-height: 120px;
}
.candidates-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
.cand-count {
  color: var(--accent);
}
.candidates-grid {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.cand-card {
  border: 1.5px solid var(--border);
  background: var(--card);
  padding: 0.75rem 1rem;
  cursor: pointer;
  transition: all 0.1s;
  min-width: 80px;
  text-align: center;
  position: relative;
}
.cand-card:hover, .cand-card.selected {
  border-color: var(--accent);
  background: white;
}
.cand-card.first {
  border-color: var(--teal);
  background: white;
}
.cand-num {
  position: absolute;
  top: 3px;
  right: 5px;
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
}
.cand-char {
  font-size: 1.8rem;
  font-weight: 700;
  display: block;
  color: var(--ink);
  line-height: 1.2;
}
.cand-tailo {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  color: var(--teal);
  display: block;
  margin-top: 2px;
}
.cand-def {
  font-size: 0.65rem;
  color: var(--muted);
  display: block;
  margin-top: 2px;
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.output-section { margin-bottom: 1.5rem; }
.out-unit { display:inline-flex; flex-direction:column; align-items:center; margin-right:4px; }
.out-char { font-size:1.6rem; line-height:1.2; }
.out-tailo { font-family:'Space Mono',monospace; font-size:0.65rem; color:var(--teal); }
.out-sound { font-size:0.7rem; cursor:not-allowed; opacity:0.3; }
.sentence-bar { display:flex; align-items:center; gap:1rem; margin-top:0.75rem; padding-top:0.75rem; border-top:1px solid var(--border); }
.sentence-tailo { font-family:'Space Mono',monospace; font-size:0.85rem; color:var(--teal); flex:1; letter-spacing:0.03em; }
.play-btn { font-family:'Space Mono',monospace; font-size:0.75rem; padding:0.4rem 1rem; border:1.5px solid var(--teal); background:transparent; color:var(--teal); cursor:not-allowed; opacity:0.5; letter-spacing:0.05em; }
.play-btn.ready { cursor:pointer; opacity:1; }
.play-btn.ready:hover { background:var(--teal); color:white; }
.output-box {
  border: 2px solid var(--ink);
  background: white;
  padding: 1rem 1.5rem;
  min-height: 60px;
  font-size: 1.6rem;
  letter-spacing: 0.05em;
  line-height: 1.5;
}
.output-box .cursor {
  display: inline-block;
  width: 2px;
  height: 1.4em;
  background: var(--accent);
  vertical-align: middle;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }
.keyboard-section {
  border: 1.5px solid var(--border);
  background: var(--card);
  padding: 1.25rem;
  margin-bottom: 1.5rem;
}
.kb-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}
.kb-row {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 0.4rem;
}
.kb-key {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  padding: 0.4rem 0.7rem;
  border: 1.5px solid var(--border);
  background: white;
  cursor: pointer;
  transition: all 0.1s;
  color: var(--ink);
  letter-spacing: 0.03em;
}
.kb-key:hover { background: var(--ink); color: var(--paper); }
.kb-key.action {
  background: var(--ink);
  color: var(--paper);
  border-color: var(--ink);
}
.kb-key.action:hover { background: var(--accent); border-color: var(--accent); }
.kb-key.del { border-color: var(--muted); color: var(--muted); }
.demos {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.demo-btn {
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  padding: 0.4rem 1rem;
  border: 1.5px solid var(--gold);
  background: transparent;
  color: var(--gold);
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.15s;
}
.demo-btn:hover { background: var(--gold); color: white; }
.stats-bar {
  display: flex;
  gap: 2rem;
  padding: 1rem 0;
  border-top: 1px solid var(--border);
  margin-top: 1rem;
}
.stat {
  font-family: 'Space Mono', monospace;
}
.stat-num {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--accent);
  display: block;
}
.stat-label {
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.bopo-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 0.3rem;
  margin-bottom: 0.5rem;
}
.bopo-key {
  font-size: 1rem;
  padding: 0.5rem;
  border: 1.5px solid var(--border);
  background: white;
  cursor: pointer;
  text-align: center;
  transition: all 0.1s;
  font-family: 'Noto Serif TC', serif;
}
.bopo-key:hover { background: var(--ink); color: var(--paper); }

@media (max-width: 640px) {
  header { padding: 1rem; gap: 0.75rem; }
  .logo { font-size: 0.95rem; }
  #subtitle-main { font-size:0.7rem; }
  #subtitle-sub { display: none; }
  main { padding: 1rem; }
  .mode-tabs { width: 100%; }
  .mode-tab { flex: 1; text-align: center; padding: 0.6rem 0.5rem; font-size: 0.75rem; }
  .demos { gap: 0.4rem; }
  .demo-btn { font-size: 0.7rem; padding: 0.35rem 0.7rem; }
  .input-bar { font-size: 1.1rem; padding: 0.85rem 1rem; }
  .input-hint { font-size: 0.6rem; }
  .bopo-grid { grid-template-columns: repeat(10, 1fr); gap: 0.25rem; }
  .bopo-key { font-size: 1.1rem; padding: 0.65rem 0.3rem; min-height: 48px; }
  .cand-card { min-width: 64px; padding: 0.6rem 0.75rem; }
  .cand-char { font-size: 1.6rem; }
  .cand-tailo { font-size: 0.6rem; }
  .cand-num { font-size: 0.55rem; }
  .output-box { padding: 0.75rem 1rem; min-height: 52px; }
  .out-char { font-size: 1.4rem; }
  .out-tailo { font-size: 0.6rem; }
  .sentence-tailo { font-size: 0.75rem; }
  .play-btn { font-size: 0.7rem; padding: 0.4rem 0.75rem; white-space: nowrap; }
  .keyboard-section { padding: 0.85rem; }
  .kb-row { gap: 0.3rem; }
  .kb-key { font-size: 0.7rem; padding: 0.5rem 0.6rem; }
  .stats-bar { gap: 1rem; flex-wrap: wrap; }
  .stat-num { font-size: 1rem; }
  .stat-label { font-size: 0.6rem; }
}
</style>

<script>
const SUPABASE_URL = 'https://gzmwypaakcweyyfnnoiw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_YpUOMfXih39yDbBpwnFtoA_T0IzCxjk';

const BOPO_TO_TAILO = {
  'ㄅ':'p','ㄆ':'ph','ㄇ':'m','ㄈ':'h',
  'ㄉ':'t','ㄊ':'th','ㄋ':'n','ㄌ':'l',
  'ㄍ':'k','ㄎ':'kh','ㄏ':'h',
  'ㄐ':'ts','ㄑ':'tsh','ㄒ':'s',
  'ㄓ':'ts','ㄔ':'tsh','ㄕ':'s','ㄖ':'j',
  'ㄗ':'ts','ㄘ':'tsh','ㄙ':'s',
  'ㄚ':'a','ㄛ':'o','ㄜ':'o','ㄝ':'e',
  'ㄞ':'ai','ㄟ':'ui','ㄠ':'au','ㄡ':'oo',
  'ㄢ':'an','ㄣ':'in','ㄤ':'ang','ㄥ':'ing',
  'ㄧ':'i','ㄨ':'u','ㄩ':'i',
  'ㄧㄢ':'ian','ㄧㄠ':'iau','ㄧㄡ':'iu','ㄧㄣ':'in','ㄧㄥ':'ing',
  'ㄨㄢ':'uan','ㄨㄣ':'un','ㄨㄥ':'ong','ㄨㄟ':'ui','ㄨㄛ':'o',
  'ㄩㄥ':'iong','ㄩㄢ':'uan','ㄩㄣ':'un',
};

const BOPO_QWERTY = [
  ['1','ㄅ'],['2','ㄉ'],['3','ˇ'],['4','ˋ'],['5','ㄓ'],
  ['6','ˊ'],['7','˙'],['8','ㄚ'],['9','ㄞ'],['0','ㄢ'],
  ['q','ㄆ'],['w','ㄊ'],['e','ㄍ'],['r','ㄐ'],['t','ㄔ'],
  ['y','ㄗ'],['u','ㄧ'],['i','ㄛ'],['o','ㄟ'],['p','ㄣ'],
  ['a','ㄇ'],['s','ㄋ'],['d','ㄎ'],['f','ㄑ'],['g','ㄕ'],
  ['h','ㄘ'],['j','ㄨ'],['k','ㄜ'],['l','ㄠ'],[';','ㄤ'],
  ['z','ㄈ'],['x','ㄌ'],['c','ㄏ'],['v','ㄒ'],['b','ㄖ'],
  ['n','ㄙ'],['m','ㄩ'],[',','ㄝ'],['.','ㄡ'],['/','ㄥ'],
];

let current = '';
let outputChars = []; // [{char, tailo}]
let mode = 'tailo';
let bopoBuffer = '';
let queryTimer = null;

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.mode-tab[onclick="setMode('${m}')"]`).classList.add('active');
  document.getElementById('tailo-keyboard').style.display = m === 'tailo' ? '' : 'none';
  document.getElementById('bopo-keyboard').style.display = m === 'bopo' ? '' : 'none';
  document.querySelector('.input-label').textContent = m === 'tailo' ? '輸入台羅' : '輸入注音';
  document.getElementById('input-bar').placeholder = m === 'tailo' ? '打台羅字母...' : '打注音符號...';
  clearInput();
}

// 建立注音鍵盤（QWERTY標準排列）
const bg = document.getElementById('bopo-grid');
BOPO_QWERTY.forEach(([key, bopo]) => {
  const k = document.createElement('div');
  k.className = 'bopo-key';
  k.innerHTML = `<span style="font-size:0.55rem;color:var(--muted);display:block;line-height:1">${key}</span><span style="font-size:1rem">${bopo}</span>`;
  k.onclick = () => addBopo(bopo);
  bg.appendChild(k);
});

// 實體鍵盤注音輸入
const keyToBopo = Object.fromEntries(BOPO_QWERTY);
document.addEventListener('keydown', e => {
  if (mode !== 'bopo') return;
  const bopo = keyToBopo[e.key.toLowerCase()];
  if (bopo) { e.preventDefault(); addBopo(bopo); }
});

function delBopo() {
  if (bopoBuffer.length > 0) {
    bopoBuffer = bopoBuffer.slice(0, -1);
    document.getElementById('input-bar').value = bopoBuffer;
    if (bopoBuffer.length === 0) {
      current = '';
      showEmpty();
    } else {
      let tailo = bopoToTailo(bopoBuffer);
      if (tailo) { current = tailo; updateCandidates(); }
    }
  } else {
    deleteOutput();
  }
}

function addBopo(b) {
  const tones = 'ˊˇˋ˙';
  if (tones.includes(b)) {
    selectFirst();
    bopoBuffer = '';
    document.getElementById('input-bar').value = '';
    return;
  }
  bopoBuffer += b;
  document.getElementById('input-bar').value = bopoBuffer;
  let tailo = bopoToTailo(bopoBuffer);
  if (tailo && tailo.length >= 1) {
    current = tailo;
    updateCandidates();
  }
}

function bopoToTailo(bopo) {
  if (!bopo) return '';
  const SM_CHARS = ['ㄅ','ㄆ','ㄇ','ㄈ','ㄉ','ㄊ','ㄋ','ㄌ','ㄍ','ㄎ','ㄏ','ㄐ','ㄑ','ㄒ','ㄓ','ㄔ','ㄕ','ㄖ','ㄗ','ㄘ','ㄙ'];
  let sm = '', rest = bopo;
  for (const c of SM_CHARS) {
    if (bopo.startsWith(c)) { sm = c; rest = bopo.slice(c.length); break; }
  }
  const smT = BOPO_TO_TAILO[sm] || '';
  // 試找韻母
  for (let len = 2; len >= 1; len--) {
    const key = rest.slice(0, len);
    if (BOPO_TO_TAILO[key]) return smT + BOPO_TO_TAILO[key];
  }
  if (!rest && sm) return smT;
  return smT || '';
}

async function queryAPI(prefix) {
  if (!prefix) { showEmpty(); return; }
  const t0 = Date.now();
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/tailo_prefix_index?prefix=eq.${encodeURIComponent(prefix.toLowerCase())}&order=frequency.desc&limit=20&select=character,tailo,frequency`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    const data = await res.json();
    const ms = Date.now() - t0;
    document.getElementById('speed-stat').textContent = ms + 'ms';
    renderCandidates(data || []);
  } catch(e) {
    renderCandidates([]);
  }
}

function renderCandidates(data) {
  const area = document.getElementById('cands');
  const count = document.getElementById('cand-count');
  if (!data.length) {
    area.innerHTML = '<span style="font-family:\'Space Mono\',monospace;font-size:0.75rem;color:var(--muted)">繼續輸入...</span>';
    count.textContent = '';
    return;
  }
  count.textContent = data.length + ' 個候選字';
  area.innerHTML = data.map((r,i) => `
    <div class="cand-card ${i===0?'first':''}" onclick="selectChar('${r.character}','${(r.tailo||'').replace(/'/g,'&#39;')}')">
      <span class="cand-num">${i===0?'SPC':i+1}</span>
      <span class="cand-char">${r.character}</span>
      <span class="cand-tailo">${r.tailo||''}</span>
    </div>
  `).join('');
}

function showEmpty() {
  document.getElementById('cands').innerHTML = '<span style="font-family:\'Space Mono\',monospace;font-size:0.75rem;color:var(--muted)">打字後候選字出現在這裡</span>';
  document.getElementById('cand-count').textContent = '';
}

function updateCandidates() {
  if (queryTimer) clearTimeout(queryTimer);
  queryTimer = setTimeout(() => queryAPI(current), 80);
}

function addKey(ch) {
  current += ch;
  document.getElementById('input-bar').value = current;
  updateCandidates();
}

function delKey() {
  current = current.slice(0, -1);
  document.getElementById('input-bar').value = current;
  updateCandidates();
}

function clearInput() {
  current = ''; bopoBuffer = '';
  document.getElementById('input-bar').value = '';
  showEmpty();
}

function clearAll() {
  clearInput();
  outputChars = [];
  renderOutput();
}

function selectChar(ch, tailo) {
  outputChars.push({ char: ch, tailo: tailo || '' });
  renderOutput();
  clearInput();
}

function renderOutput() {
  const el = document.getElementById('output');
  const bar = document.getElementById('sentence-bar');
  const tailoEl = document.getElementById('sentence-tailo');
  const playBtn = document.getElementById('play-btn');
  if (outputChars.length === 0) {
    el.innerHTML = '<span class="cursor"></span>';
    bar.style.display = 'none';
    return;
  }
  const chars = outputChars.map(c =>
    `<span class="out-unit">
      <span class="out-char">${c.char}</span>
      <span class="out-tailo">${c.tailo}</span>
      <span class="out-sound" title="單字發音（即將開放）">🔊</span>
    </span>`
  ).join('');
  el.innerHTML = chars + '<span class="cursor"></span>';
  // 整句台羅
  const sentence = outputChars.filter(c => c.tailo).map(c => c.tailo).join('-');
  tailoEl.textContent = sentence;
  bar.style.display = sentence ? 'flex' : 'none';
  // 按鈕狀態：等廖教授 API 開通後啟用
  playBtn.classList.remove('ready');
  playBtn.title = '整句發音（廖教授 BRONCI 即將開放）';
}

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
      if (choice.outcome === 'accepted') {
        document.getElementById('install-btn').style.display = 'none';
      }
      deferredPrompt = null;
    });
  }
}

function playSentence() {
  // 預留：廖教授 BRONCI TTS API
  // const sentence = outputChars.map(c => c.tailo).join('-');
  // fetch('https://asr.bitfull.tw/tts-sentence?text=' + encodeURIComponent(sentence))
  alert('整句發音功能即將開放\n廖教授 BRONCI TTS 串接中...');
}

function deleteOutput() {
  if (outputChars.length > 0) {
    outputChars.pop();
    renderOutput();
  }
}

function selectFirst() {
  const card = document.querySelector('.cand-card.first');
  if (card) {
    const ch = card.querySelector('.cand-char').textContent;
    const tailo = card.querySelector('.cand-tailo').textContent;
    selectChar(ch, tailo);
  }
}

// 鍵盤事件
document.getElementById('input-bar').addEventListener('input', e => {
  if (mode === 'tailo') {
    current = e.target.value;
    updateCandidates();
  }
});
document.addEventListener('keydown', e => {
  if (e.key === ' ' && document.activeElement === document.getElementById('input-bar')) {
    e.preventDefault(); selectFirst();
  }
  if (e.key === 'Backspace' && document.activeElement !== document.getElementById('input-bar')) {
    deleteOutput();
  }
  if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    const cards = document.querySelectorAll('.cand-card');
    if (cards[idx]) {
      const ch = cards[idx].querySelector('.cand-char').textContent;
      const tailo = cards[idx].querySelector('.cand-tailo').textContent;
      selectChar(ch, tailo);
    }
  }
});

// 示範
let demoTimer = null;
function demo(word) {
  clearAll();
  let i = 0;
  if (demoTimer) clearInterval(demoTimer);
  demoTimer = setInterval(() => {
    if (i < word.length) {
      current += word[i]; i++;
      document.getElementById('input-bar').value = current;
      updateCandidates();
    } else {
      setTimeout(selectFirst, 400);
      clearInterval(demoTimer);
    }
  }, 250);
}

showEmpty();
